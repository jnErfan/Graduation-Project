{% extends 'portal_base.html' %}
{% block title %}Edit Course{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h1 class="mb-1">Edit Course</h1>
    <p class="text-muted">Update course information and department assignment.</p>
  </div>
  <a href="{{ url_for('portal.manage_courses') }}" class="btn btn-outline-secondary">Back to Courses</a>
</div>
<div class="card card-section">
  <div class="card-body">
    <form method="post">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Course Name</label>
          <input class="form-control" name="name" value="{{ course.name }}" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Course Code</label>
          <input class="form-control" name="code" value="{{ course.code }}" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Credits</label>
          <input class="form-control" name="credits" type="number" min="1" value="{{ course.credits }}" required>
        </div>
        <div class="col-md-12">
          <label class="form-label">Department</label>
          <select class="form-select" name="department_id" required>
            {% for dept in departments %}
            <option value="{{ dept.id }}" {% if dept.id == course.department_id %}selected{% endif %}>{{ dept.name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="mt-4">
        <button class="btn btn-primary">Save Changes</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
