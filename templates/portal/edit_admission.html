{% extends 'portal_base.html' %}
{% block title %}Edit Admission{% endblock %}
{% block content %}
<h1>Edit Admission</h1>
<p class="text-muted">Update admission record details.</p>
<div class="card shadow-sm">
  <div class="card-body">
    <form method="post">
      <input type="hidden" name="admission_id" value="{{ item.id }}">
      <div class="mb-3">
        <label class="form-label">Title</label>
        <input class="form-control" name="title" value="{{ item.title }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea class="form-control" name="description" rows="3" required>{{ item.description }}</textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Application URL</label>
        <input class="form-control" name="application_url" value="{{ item.application_url }}">
      </div>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Start Date</label>
          <input class="form-control" name="start_date" type="date" value="{{ item.start_date }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">End Date</label>
          <input class="form-control" name="end_date" type="date" value="{{ item.end_date }}">
        </div>
      </div>
      <div class="mt-3">
        <button class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('portal.manage_admissions') }}" class="btn btn-secondary ms-2">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
