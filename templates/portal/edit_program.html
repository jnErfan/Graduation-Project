{% extends 'portal_base.html' %}
{% block title %}Edit Program{% endblock %}
{% block content %}
<h1>Edit Program</h1>
<p class="text-muted">Update program details before publishing.</p>
<div class="card shadow-sm">
  <div class="card-body">
    <form method="post">
      <input type="hidden" name="program_id" value="{{ item.id }}">
      <div class="mb-3">
        <label class="form-label">Title</label>
        <input class="form-control" name="title" value="{{ item.title }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea class="form-control" name="description" rows="3" required>{{ item.description }}</textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Details</label>
        <textarea class="form-control" name="details" rows="4">{{ item.details }}</textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Image URL</label>
        <input class="form-control" name="image_url" value="{{ item.image_url }}">
      </div>
      <div class="mb-3">
        <label class="form-label">Link URL</label>
        <input class="form-control" name="link_url" value="{{ item.link_url }}">
      </div>
      <button class="btn btn-primary">Save Changes</button>
      <a href="{{ url_for('portal.manage_programs') }}" class="btn btn-secondary ms-2">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
