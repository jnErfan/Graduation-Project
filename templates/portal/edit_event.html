{% extends 'portal_base.html' %}
{% block title %}Edit Event{% endblock %}
{% block content %}
<h1>Edit Event</h1>
<p class="text-muted">Update event details before publishing.</p>
<div class="card shadow-sm">
  <div class="card-body">
    <form method="post">
      <input type="hidden" name="event_id" value="{{ item.id }}">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Title</label>
          <input class="form-control" name="title" value="{{ item.title }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Date</label>
          <input class="form-control" name="event_date" type="date" value="{{ item.event_date }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Start time</label>
          <input class="form-control" name="start_time" value="{{ item.start_time }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">End time</label>
          <input class="form-control" name="end_time" value="{{ item.end_time }}">
        </div>
        <div class="col-md-12">
          <label class="form-label">Location</label>
          <input class="form-control" name="location" value="{{ item.location }}">
        </div>
        <div class="col-md-12">
          <label class="form-label">Category</label>
          <input class="form-control" name="category" value="{{ item.category }}">
        </div>
        <div class="col-md-12">
          <label class="form-label">Image URL</label>
          <input class="form-control" name="image_url" value="{{ item.image_url }}">
        </div>
        <div class="col-md-12">
          <label class="form-label">Description</label>
          <textarea class="form-control" name="description" rows="4">{{ item.description }}</textarea>
        </div>
      </div>
      <div class="mt-3">
        <button class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('portal.manage_events') }}" class="btn btn-secondary ms-2">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
