{% extends 'portal_base.html' %}
{% block title %}Edit News{% endblock %}
{% block content %}
<h1>Edit News Item</h1>
<p class="text-muted">Update the news item before publishing.</p>
<div class="card shadow-sm">
  <div class="card-body">
    <form method="post">
      <input type="hidden" name="news_id" value="{{ item.id }}">
      <div class="mb-3">
        <label class="form-label">Title</label>
        <input class="form-control" name="title" value="{{ item.title }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Summary</label>
        <input class="form-control" name="summary" value="{{ item.summary }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Content</label>
        <textarea class="form-control" name="content" rows="4">{{ item.content }}</textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Image URL</label>
        <input class="form-control" name="image_url" value="{{ item.image_url }}">
      </div>
      <div class="mb-3">
        <label class="form-label">Link URL</label>
        <input class="form-control" name="link_url" value="{{ item.link_url }}">
      </div>
      <button class="btn btn-primary">Save Changes</button>
      <a href="{{ url_for('portal.manage_news') }}" class="btn btn-secondary ms-2">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
