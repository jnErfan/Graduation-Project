{% extends 'portal_base.html' %}
{% block title %}Edit User{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h1 class="mb-1">Edit User</h1>
    <p class="text-muted">Update account details and role assignments.</p>
  </div>
  <a href="{{ url_for('portal.manage_users') }}" class="btn btn-outline-secondary">Back to Users</a>
</div>
<div class="card card-section">
  <div class="card-body">
    <form method="post">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Name</label>
          <input class="form-control" name="name" value="{{ user.name }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input class="form-control" name="email" type="email" value="{{ user.email }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Role</label>
          <select class="form-select" name="role_id" required>
            {% for role in roles %}
            <option value="{{ role.id }}" {% if role.id == user.role_id %}selected{% endif %}>{{ role.name|title }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Department</label>
          <select class="form-select" name="department_id">
            <option value="">No department</option>
            {% for dept in departments %}
            <option value="{{ dept.id }}" {% if dept.id == user.department_id %}selected{% endif %}>{{ dept.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-12">
          <label class="form-label">New Password</label>
          <input class="form-control" name="password" type="password" placeholder="Leave blank to keep current password">
        </div>
      </div>
      <div class="mt-4">
        <button class="btn btn-primary">Save Changes</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
