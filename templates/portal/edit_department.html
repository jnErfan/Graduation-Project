{% extends 'portal_base.html' %}
{% block title %}Edit Department{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h1 class="mb-1">Edit Department</h1>
    <p class="text-muted">Update department name, code, and description.</p>
  </div>
  <a href="{{ url_for('portal.manage_departments') }}" class="btn btn-outline-secondary">Back to Departments</a>
</div>
<div class="card card-section">
  <div class="card-body">
    <form method="post">
      <div class="row g-3">
        <div class="col-md-5">
          <label class="form-label">Department Name</label>
          <input class="form-control" name="name" value="{{ department.name }}" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Code</label>
          <input class="form-control" name="code" value="{{ department.code }}" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Description</label>
          <input class="form-control" name="description" value="{{ department.description }}">
        </div>
      </div>
      <div class="mt-4">
        <button class="btn btn-primary">Save Changes</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
