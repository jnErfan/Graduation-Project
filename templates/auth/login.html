{% extends 'base.html' %}
{% block title %}Login | JSAFC SIE{% endblock %}
{% block content %}
<section class="hero-landing overflow-hidden">
  <div class="container py-5">
    <div class="row align-items-center gy-5">
      <div class="col-lg-6 " >
        <div class="card shadow-sm animate-fade-in rounded-4">
          <div class="card-body p-5">
            <h3 class="card-title mb-4">Student & Admin Portal</h3>
            <p class="text-muted mb-4">Use your student or admin account to access the portal. Faculty users do not have portal access in this version.</p>
            <form action="" method="post">
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" name="email" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" required>
              </div>
              <button type="submit" class="btn btn-primary w-100">Sign In</button>
            </form>
          </div>
        </div>
      </div>
      <div class="col-lg-6 ">
        <div class="hero-image-card rounded-4 overflow-hidden shadow-xl position-relative justify-content-center align-items-center d-flex">
          <img src="https://www.jsafc.edu.cn/images/kouhao.jpg" class="img-fluid" alt="University campus entrance">
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
